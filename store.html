<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="file_0000000082c071f582b85259d9acf7a0.png">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lanthano Store</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lanthano Music">
  <link rel="apple-touch-icon" href="file_0000000082c071f582b85259d9acf7a0.png">

  <style>
    body{
      margin:0;
      background:#111;
      color:#eee;
      font-family:Arial, sans-serif;
      text-align:center;
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:40px 20px 80px;
    }

    .back{
      display:block;
      text-align:left;
      color:#fff;
      text-decoration:none;
      margin-bottom:30px;
      font-size:1rem;
    }

    .back:hover{
      color:#fff;
    }

    h1{
      font-size:3em;
      margin-bottom:15px;
    }

    .subtitle{
      color:#bdbdbd;
      font-size:1.15rem;
      line-height:1.8;
      max-width:750px;
      margin:0 auto 45px;
    }

    .store-preview{
      width:100%;
      max-width:900px;
      border-radius:14px;
      border:2px solid #2b2b2b;
      box-shadow:0 15px 45px rgba(0,0,0,.45);
      margin-bottom:55px;
      cursor:pointer;
      transition:transform .25s ease, box-shadow .25s ease;
    }

    .store-preview:hover{
      transform:scale(1.02);
      box-shadow:
        0 20px 55px rgba(0,0,0,.55),
        0 0 25px rgba(255,122,0,.18);
    }

    .shop-button{
      display:inline-block;
      padding:18px 60px;
      color:white;
      text-decoration:none;
      font-size:1.2rem;
      font-weight:bold;
      border-radius:999px;
      background:linear-gradient(135deg,#ff7a00,#ff5400);
      box-shadow:
        0 0 20px rgba(255,122,0,.45),
        0 0 45px rgba(255,122,0,.25);
      transition:
        transform .25s,
        box-shadow .25s,
        filter .25s;
    }

    .shop-button:hover{
      transform:translateY(-4px) scale(1.03);
      filter:brightness(1.08);
      box-shadow:
        0 0 35px rgba(255,122,0,.75),
        0 0 65px rgba(255,122,0,.35);
    }

    .footer{
      margin-top:40px;
      color:#777;
      font-size:.95rem;
    }

    @media (max-width:700px){
      h1{
        font-size:2.3em;
      }

      .subtitle{
        font-size:1rem;
      }

      .shop-button{
        width:90%;
        max-width:340px;
        padding:18px 0;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <a class="back" href="index.html">◀ Home</a>

    <h1>Lanthano Store</h1>

    <p class="subtitle">
      If you enjoy Lanthano Music and want to support the project, the official merchandise collection is one way to help support future releases while representing the wider Lanthano project.
    </p>

    <a href="https://lanthanostore.printful.me/" target="_blank" rel="noopener noreferrer">
      <img
        class="store-preview"
        src="shirtimage.png"
        alt="Lanthano Music Store Preview">
    </a>

    <br>

    <a
      class="shop-button"
      href="https://lanthanostore.printful.me/"
      target="_blank"
      rel="noopener noreferrer">
      Browse the Collection →
    </a>

    <p class="footer">
      Ideas Worth Representing.
    </p>
  </div>

</body>
</html>
